apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: ratify-ratify-gatekeeper-provider-executor-1
  namespace: gatekeeper-system
spec:
  scopes:
    - "registry:5000"
  stores:
    - type: oras
      parameters:
        cosignEnabled: true
        useHttp: true
        authProvider:
          name: k8Secrets
          serviceAccountName: ratify-admin
  verifiers:
    - name: notation
      type: notation
      parameters:
        verificationCertStores:
          ca:
            cert-0:
              - ratify-notation-inline-cert-0
        trustPolicyDoc:
          version: "1.0"
          trustPolicies:
            - name: default
              registryScopes:
                - "*"
              signatureVerification:
                level: strict
              trustStores:
                - ca:cert-0
              trustedIdentities:
                - "*"
    - name: cosign
      type: cosign
      parameters:
        key: /usr/local/ratify-certs/cosign/cosign.pub
  policyEnforcer:
    type: configPolicy
