apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: ratify-gatekeeper-provider-executor-1
spec:
  scopes:
    - "wabbitnetworks.azurecr.io"
  stores:
    - type: registry-store
      parameters:
        allowCosignTag: true
        credential:
          provider: "static"
  verifiers:
    - name: cosign
      type: cosign
      parameters:
        trustPolicies:
          - scopes:
              - "wabbitnetworks.azurecr.io"
            certificateIdentity: ""
            certificateIdentityRegex: ".*"
            certificateOIDCIssuer: ""
            certificateOIDCIssuerRegex: ".*"
            ignoreTLog: false
            ignoreCTLog: false
  policyEnforcer:
    type: "threshold-policy"
    parameters:
      policy:
        threshold: 1
        rules:
          - verifierName: "cosign"
