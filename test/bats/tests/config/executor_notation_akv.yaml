apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: ratify-gatekeeper-provider-executor-1
spec:
  scopes:
    - "registry:5000"
  stores:
    - type: registry-store
      parameters:
        plainHttp: true
        credential:
          provider: "static"
          username: "test_user"
          password: "test_pw"
  verifiers:
    - name: notation
      type: notation
      parameters:
        certificates:
          - type: "ca"
            azurekeyvault:
              vaultURL: "__VAULT_URI__"
              clientID: "__CLIENT_ID__"
              tenantID: "__TENANT_ID__"
              certificates:
                - name: "__NOTATION_CERT_NAME__"
  policyEnforcer:
    type: "threshold-policy"
    parameters:
      policy:
        threshold: 1
        rules:
          - verifierName: "notation"
