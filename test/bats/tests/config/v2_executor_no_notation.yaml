apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: ratify-ratify-gatekeeper-provider-executor-1
  namespace: gatekeeper-system
spec:
  scopes:
    - "registry:5000"
  stores:
    - type: oras
      parameters:
        cosignEnabled: true
        useHttp: true
  verifiers:
    - name: cosign
      type: cosign
      parameters:
        key: /usr/local/ratify-certs/cosign/cosign.pub
  policyEnforcer:
    type: configPolicy
