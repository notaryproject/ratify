apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: ratify-gatekeeper-provider-executor-1
spec:
  scopes:
    - "registry:5000"
  stores:
    - type: registry-store
      parameters:
        plainHttp: true
        allowCosignTag: true
        credential:
          provider: "static"
          username: "test_user"
          password: "test_pw"
  verifiers:
    - name: dummy
      type: notation
      parameters:
        scopes:
          - "does-not-match.example.com"
        certificates:
          - type: "ca"
            inline: __NOTATION_CERT__
  policyEnforcer:
    type: "threshold-policy"
    parameters:
      policy:
        threshold: 1
        rules:
          - verifierName: "dummy"
