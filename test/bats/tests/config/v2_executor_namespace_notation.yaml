apiVersion: config.ratify.dev/v2alpha1
kind: Executor
metadata:
  name: executor-notation-default
  namespace: default
spec:
  scopes:
    - "registry:5000/notation"
  stores:
    - type: oras
      parameters:
        cosignEnabled: true
        useHttp: true
  verifiers:
    - name: notation
      type: notation
      parameters:
        verificationCertStores:
          ca:
            cert-0:
              - ratify-notation-inline-cert-0
        trustPolicyDoc:
          version: "1.0"
          trustPolicies:
            - name: default
              registryScopes:
                - "*"
              signatureVerification:
                level: strict
              trustStores:
                - ca:cert-0
              trustedIdentities:
                - "*"
  policyEnforcer:
    type: configPolicy
