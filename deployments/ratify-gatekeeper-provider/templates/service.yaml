apiVersion: v1
kind: Service
metadata:
  name: {{ include "ratify.fullname" . }}
  labels:
    {{- include "ratify.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 6001
      targetPort: https
  selector:
    {{- include "ratify.selectorLabels" . | nindent 4 }}
