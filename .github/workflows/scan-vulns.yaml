name: scan_vulns
on:
  push:
    paths-ignore:
      - "docs/**"
      - "library/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "library/**"
      - "**.md"
  schedule:
    - cron: "30 8 * * 0" # early morning (08:30 UTC) every Sunday
  workflow_dispatch:

permissions: read-all

jobs:
  govulncheck:
    name: "Run govulncheck"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.26.4"
          check-latest: true
      - uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0

  scan_vulnerabilities:
    name: "[Trivy] Scan for vulnerabilities"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      TRIVY_VERSION: 0.70.0
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Download trivy
        run: |
          pushd $(mktemp -d)
          wget https://github.com/aquasecurity/trivy/releases/download/v${{ env.TRIVY_VERSION }}/trivy_${{ env.TRIVY_VERSION }}_Linux-64bit.tar.gz
          tar zxvf trivy_${{ env.TRIVY_VERSION }}_Linux-64bit.tar.gz
          echo "$(pwd)" >> $GITHUB_PATH
      
      - name: Restore Trivy cache
        id: restore-trivy-cache
        uses: ./.github/actions/restore_trivy_cache

      - name: Run trivy on git repository
        run: |
          trivy fs ${{ steps.restore-trivy-cache.outputs.cache-hit == 'false' && ' ' || '--skip-db-update' }} --format table --ignore-unfixed --scanners vuln .

      - name: Build docker images
        run: |
          make build-local-ratify-gatekeeper-provider-image
      - name: Run trivy on images for all severity
        run: |
          trivy image ${{ steps.restore-trivy-cache.outputs.cache-hit == 'false' && ' ' || '--skip-db-update' }} --ignore-unfixed --pkg-types="os,library" "localbuild:test"
      - name: Run trivy on images and exit on HIGH/CRITICAL severity
        run: |
          trivy image ${{ steps.restore-trivy-cache.outputs.cache-hit == 'false' && ' ' || '--skip-db-update' }} --ignore-unfixed --exit-code 1 --severity HIGH,CRITICAL --pkg-types="os,library" "localbuild:test"
