name: e2e-k8s

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      k8s_version:
        description: "Kubernetes version"
        required: true
        default: "1.31.2"
        type: string
      gatekeeper_version:
        description: "Gatekeeper version"
        required: true
        default: "3.18.0"
        type: string
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version"
        required: false
        default: "1.31.2"
        type: string
      gatekeeper_version:
        description: "Gatekeeper version"
        required: false
        default: "3.18.0"
        type: string
  push:
    branches:
      - "xinhl/*"

jobs:
  build_test_e2e:
    name: "Build and run e2e Test"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      KUBERNETES_VERSION: ${{ inputs.k8s_version || '1.31.2' }}
      GATEKEEPER_VERSION: ${{ inputs.gatekeeper_version || '3.18.0' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go 1.22
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.22"

      - name: Bootstrap e2e
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          make e2e-bootstrap KUBERNETES_VERSION=${{ env.KUBERNETES_VERSION }}
          make generate-certs

      - name: Run e2e
        run: |
          make e2e-deploy-gatekeeper GATEKEEPER_VERSION=${{ env.GATEKEEPER_VERSION }}
          make e2e-deploy-ratify GATEKEEPER_VERSION=${{ env.GATEKEEPER_VERSION }}
          make test-e2e

      - name: Save logs
        if: ${{ always() }}
        run: |
          kubectl logs -n gatekeeper-system -l app.kubernetes.io/name=ratify-gatekeeper-provider --tail=-1 > logs-ratify-${{ env.KUBERNETES_VERSION }}-${{ env.GATEKEEPER_VERSION }}.json
          kubectl logs -n gatekeeper-system -l control-plane=controller-manager --tail=-1 > logs-gatekeeper-controller-${{ env.KUBERNETES_VERSION }}-${{ env.GATEKEEPER_VERSION }}.json
          kubectl logs -n gatekeeper-system -l control-plane=audit-controller --tail=-1 > logs-gatekeeper-audit-${{ env.KUBERNETES_VERSION }}-${{ env.GATEKEEPER_VERSION }}.json

      - name: Upload artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        if: ${{ always() }}
        with:
          name: e2e-logs-${{ env.KUBERNETES_VERSION }}-${{ env.GATEKEEPER_VERSION }}
          path: |
            logs-*.json
