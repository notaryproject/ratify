name: e2e-k8s

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version"
        required: true
        default: "1.35.5"
        type: string
      gatekeeper_version:
        description: "Gatekeeper version"
        required: true
        default: "3.22.2"
        type: string
      ratify_image_repository:
        description: "Ratify image repository used by the Helm chart"
        required: false
        default: "localbuild"
        type: string
      ratify_image_tag:
        description: "Ratify image tag used by the Helm chart"
        required: false
        default: "test"
        type: string
  workflow_call:
    inputs:
      k8s_version:
        description: "Kubernetes version"
        required: true
        default: "1.35.5"
        type: string
      gatekeeper_version:
        description: "Gatekeeper version"
        required: true
        default: "3.22.2"
        type: string
      ratify_image_repository:
        description: "Ratify image repository used by the Helm chart"
        required: false
        default: "localbuild"
        type: string
      ratify_image_tag:
        description: "Ratify image tag used by the Helm chart"
        required: false
        default: "test"
        type: string

jobs:
  build_test_e2e:
    name: "Build and run e2e Test"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go 1.22
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.22"
      - name: Restore Trivy cache
        uses: ./.github/actions/restore_trivy_cache
      - name: Bootstrap e2e
        run: |
          mkdir -p $GITHUB_WORKSPACE/bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH
          make e2e-bootstrap KUBERNETES_VERSION=${{ inputs.k8s_version }}
          make generate-certs
      - name: Run e2e with config policy
        run: |
          make e2e-deploy-gatekeeper GATEKEEPER_VERSION=${{ inputs.gatekeeper_version }}
          make e2e-deploy-ratify \
            GATEKEEPER_VERSION="${{ inputs.gatekeeper_version }}" \
            E2E_RATIFY_IMAGE_REPOSITORY="${{ inputs.ratify_image_repository }}" \
            E2E_RATIFY_IMAGE_TAG="${{ inputs.ratify_image_tag }}"
          make test-e2e GATEKEEPER_VERSION=${{ inputs.gatekeeper_version }}
      - name: Save logs
        if: ${{ always() }}
        run: |
          kubectl logs -n gatekeeper-system -l app.kubernetes.io/name=ratify-gatekeeper-provider --tail=-1 > logs-ratify-provider-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}-config-policy.json 2>&1 || true
          kubectl get executors.config.ratify.dev -A -o yaml > logs-executor-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}.yaml 2>&1 || true
      - name: Run e2e with Rego policy
        run: |
          make test-e2e
      - name: Save logs
        if: ${{ always() }}
        run: |
          kubectl logs -n gatekeeper-system -l control-plane=controller-manager --tail=-1 > logs-externaldata-controller-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}.json
          kubectl logs -n gatekeeper-system -l control-plane=audit-controller --tail=-1 > logs-externaldata-audit-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}.json
          kubectl logs -n gatekeeper-system -l app=ratify --tail=-1 > logs-ratify-preinstall-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}-rego-policy.json
          kubectl logs -n gatekeeper-system -l app.kubernetes.io/name=ratify --tail=-1 > logs-ratify-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}-rego-policy.json
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: e2e-logs-${{ inputs.k8s_version }}-${{ inputs.gatekeeper_version }}
          path: |
            logs-*.json
